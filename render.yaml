services:
  - type: web
    name: chaduvkondi
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: chaduvkondi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        value: https://chaduvkondi.onrender.com

databases:
  - name: chaduvkondi-db
    plan: starter
    region: oregon
    postgresMajorVersion: 16
